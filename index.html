<!DOCTYPE html>
<html lang="ko">
<!--
================================================================================
* Project       : KakaoTalk Chat Viewer
* Description   : A local, browser-based viewer for exported KakaoTalk chat logs.
* Features      : 
* - Drag-and-drop file upload (PC/Mobile Korean & English formats supported)
* - Interactive Calendar navigation (highlighted active dates/months/years)
* - Keyword search with highlight, counter, and scroll functionalities
* - 'Set as Me' feature (right-aligned yellow bubbles for the current user)
* - System message parsing (invites, exits)
* - Fully responsive layout for Desktop and Mobile environments
* - Collapsible Sidebar for Mobile view with auto-hide on date selection
* Author        : Kyungmin Lee
* Date Created  : 2026.04.03
* Version       : 1.2.0
* Tech Stack    : HTML5, CSS3, JavaScript (Vanilla), Tailwind CSS
================================================================================
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KakaoTalk Chat Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 커스텀 스크롤바 설정 */
    .custom-scrollbar {
      scrollbar-width: thin;
      scrollbar-color: #8a9fac transparent;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #8a9fac;
      border-radius: 10px;
    }
    
    /* 애니메이션 및 유틸리티 */
    .invisible { visibility: hidden; }
    .break-words { word-break: break-word; }
    .whitespace-pre-wrap { white-space: pre-wrap; }
    
    /* 드래그 앤 드롭 활성화 시 공통 스타일 */
    .drop-active {
      border-color: #ffe812 !important;
      background-color: #fefce8 !important; /* bg-yellow-50 */
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen overflow-hidden">
  
  <div id="root" class="w-full h-full"></div>

  <script>
    // --- [ 브라우저 기본 드래그 앤 드롭 방지 (파일 오동작 방지) ] ---
    window.addEventListener("dragover", function(e) {
      e.preventDefault();
    }, false);
    window.addEventListener("drop", function(e) {
      e.preventDefault();
    }, false);

    // --- [ SVG 아이콘 정의 ] ---
    const Icons = {
      Upload: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
      MessageCircle: `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>`,
      FileText: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>`,
      ChevronLeft: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
      ChevronRight: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
      ChevronUp: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>`,
      ChevronDown: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`,
      Menu: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>`,
      Calendar: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
      Search: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
      ArrowUp: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`,
      ArrowDown: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>`,
      X: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
      User: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`
    };

    // --- [ 전역 상태 관리 ] ---
    let state = {
      messages: [],
      groupedMessages: {},
      activeDates: new Set(),
      minYear: null,
      maxYear: null,
      currentViewDate: new Date(),
      calendarMode: 'day', // 'day', 'month', 'year'
      fileName: '',
      // 모바일 사이드바 토글 상태
      isSidebarOpen: false,
      // 본인 설정 상태
      currentUser: '',
      // 검색 관련 상태
      searchQuery: '',
      searchResults: [],
      currentSearchIndex: -1 // 0부터 N-1까지. (가장 최신은 N-1)
    };

    // --- [ 유틸리티 함수 ] ---
    function escapeHtml(unsafe) {
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function stringToColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      let color = '#';
      for (let i = 0; i < 3; i++) {
        const value = (hash >> (i * 8)) & 0xFF;
        color += ('00' + value.toString(16)).substr(-2);
      }
      return color + 'CC';
    }

    function getDayName(dateStr) {
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      return days[new Date(dateStr).getDay()];
    }

    function formatDateKor(dateStr) {
      const [y, m, d] = dateStr.split('-');
      return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일 ${getDayName(dateStr)}요일`;
    }

    // --- [ 파싱 로직 ] ---
    function parseChat(text) {
      const lines = text.split('\n');
      const parsedMessages = [];
      let currentMessage = null;
      
      const engRegex = /^([a-zA-Z]{3} \d{1,2}, \d{4}) at (\d{1,2}:\d{2}[\s\u202F]?[AP]M), (.*?) : (.*)$/;
      const engSysRegex = /^([a-zA-Z]{3} \d{1,2}, \d{4}) at (\d{1,2}:\d{2}[\s\u202F]?[AP]M):\s*(.*)$/;
      
      const korRegex = /^(\d{4})[년.]\s*(\d{1,2})[월.]\s*(\d{1,2})[일.]?\s*(오전|오후)\s*(\d{1,2}:\d{2}),\s*(.*?)\s*:\s*(.*)$/;
      const korSysRegex = /^(\d{4})[년.]\s*(\d{1,2})[월.]\s*(\d{1,2})[일.]?\s*(오전|오후)\s*(\d{1,2}:\d{2}):\s*(.*)$/;
      
      const engDateRegex = /^[-]*\s*[a-zA-Z]+,\s+[a-zA-Z]+\s+\d{1,2},\s+\d{4}\s*[-]*$/;
      const korDateRegex = /^[-]*\s*\d{4}년 \d{1,2}월 \d{1,2}일 \S요일\s*[-]*$/;
      
      const monthMap = {"Jan":"01", "Feb":"02", "Mar":"03", "Apr":"04", "May":"05", "Jun":"06", "Jul":"07", "Aug":"08", "Sep":"09", "Oct":"10", "Nov":"11", "Dec":"12"};

      lines.forEach(line => {
        const cleanLine = line.replace(/\r$/, '');
        const engMatch = cleanLine.match(engRegex);
        const korMatch = cleanLine.match(korRegex);
        const engSysMatch = cleanLine.match(engSysRegex);
        const korSysMatch = cleanLine.match(korSysRegex);
        
        if (engMatch || korMatch || engSysMatch || korSysMatch) {
          if (currentMessage) parsedMessages.push(currentMessage);
          
          let formattedDate = "", timeForUI = "", sender = "", msg = "", isSystem = false;
          
          if (engMatch) {
            const dateParts = engMatch[1].match(/^([a-zA-Z]{3}) (\d{1,2}), (\d{4})$/);
            if (dateParts) {
              formattedDate = `${dateParts[3]}-${monthMap[dateParts[1]]}-${dateParts[2].padStart(2, '0')}`;
            }
            timeForUI = engMatch[2].replace(/[\u202F]/g, ' ');
            sender = engMatch[3].trim();
            msg = engMatch[4];
          } else if (korMatch) {
            formattedDate = `${korMatch[1]}-${korMatch[2].padStart(2,'0')}-${korMatch[3].padStart(2,'0')}`;
            timeForUI = `${korMatch[4]} ${korMatch[5]}`;
            sender = korMatch[6].trim();
            msg = korMatch[7];
          } else if (engSysMatch) {
            const dateParts = engSysMatch[1].match(/^([a-zA-Z]{3}) (\d{1,2}), (\d{4})$/);
            if (dateParts) {
              formattedDate = `${dateParts[3]}-${monthMap[dateParts[1]]}-${dateParts[2].padStart(2, '0')}`;
            }
            timeForUI = engSysMatch[2].replace(/[\u202F]/g, ' ');
            sender = 'SYSTEM';
            msg = engSysMatch[3];
            isSystem = true;
          } else if (korSysMatch) {
            formattedDate = `${korSysMatch[1]}-${korSysMatch[2].padStart(2,'0')}-${korSysMatch[3].padStart(2,'0')}`;
            timeForUI = `${korSysMatch[4]} ${korSysMatch[5]}`;
            sender = 'SYSTEM';
            msg = korSysMatch[6];
            isSystem = true;
          }

          currentMessage = {
            date: formattedDate,
            time: timeForUI,
            sender: sender,
            message: msg,
            isSystem: isSystem
          };
        } else {
          if (!engDateRegex.test(cleanLine) && !korDateRegex.test(cleanLine) && currentMessage && cleanLine.trim() !== '') {
            currentMessage.message += '\n' + cleanLine;
          }
        }
      });
      if (currentMessage) parsedMessages.push(currentMessage);
      return parsedMessages;
    }

    function groupMessages(messages) {
      const groups = {};
      messages.forEach((msg, idx) => {
        if (!groups[msg.date]) groups[msg.date] = [];
        groups[msg.date].push({ ...msg, originalIndex: idx });
      });

      Object.keys(groups).forEach(date => {
        const msgs = groups[date];
        msgs.forEach((msg, i) => {
          if (msg.isSystem) return;
          const prev = msgs[i - 1];
          const next = msgs[i + 1];
          msg.showProfile = !(prev && !prev.isSystem && prev.sender === msg.sender && prev.time === msg.time);
          msg.showTime = !(next && !next.isSystem && next.sender === msg.sender && next.time === msg.time);
        });
      });
      return groups;
    }

    // --- [ 전역 앱 객체 (이벤트 핸들러용) ] ---
    window.app = {
      processFile: function(file) {
        if (!file) return;
        state.fileName = file.name;
        
        // 검색 상태 초기화
        state.searchQuery = '';
        state.searchResults = [];
        state.currentSearchIndex = -1;
        state.isSidebarOpen = false; // 모바일 환경 시 기본으로 접기

        document.body.style.cursor = 'wait';
        
        setTimeout(() => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const text = e.target.result;
            const parsed = parseChat(text);
            
            if (parsed.length > 0) {
              state.messages = parsed;
              state.groupedMessages = groupMessages(parsed);
              
              const dates = new Set(parsed.map(m => m.date));
              state.activeDates = dates;
              
              const years = Array.from(dates).map(d => parseInt(d.split('-')[0]));
              state.minYear = Math.min(...years);
              state.maxYear = Math.max(...years);
              state.currentViewDate = new Date(parsed[0].date);
              state.calendarMode = 'day';
              
              renderMain();
            } else {
              alert('지원하지 않는 형식의 텍스트 파일이거나 파싱할 대화 내역이 없습니다.');
            }
            
            document.body.style.cursor = 'default';
          };
          reader.readAsText(file, "UTF-8");
        }, 50);
      },
      handleFileUpload: function(event) {
        if(event.target.files && event.target.files.length > 0) {
          app.processFile(event.target.files[0]);
        }
        event.target.value = ''; 
      },
      
      // --- Drag and Drop 이벤트 로직 ---
      handleDragEnter: function(event) {
        event.preventDefault();
        event.stopPropagation();
        event.currentTarget.classList.add('drop-active');
      },
      handleDragOver: function(event) {
        event.preventDefault();
        event.stopPropagation();
        event.dataTransfer.dropEffect = 'copy';
        event.currentTarget.classList.add('drop-active');
      },
      handleDragLeave: function(event) {
        event.preventDefault();
        event.stopPropagation();
        if(!event.currentTarget.contains(event.relatedTarget)) {
            event.currentTarget.classList.remove('drop-active');
        }
      },
      handleDrop: function(event) {
        event.preventDefault();
        event.stopPropagation();
        event.currentTarget.classList.remove('drop-active');
        if(event.dataTransfer.files && event.dataTransfer.files.length > 0) {
          app.processFile(event.dataTransfer.files[0]);
        }
      },
      
      // --- Sidebar Toggle 로직 ---
      toggleSidebar: function() {
        state.isSidebarOpen = !state.isSidebarOpen;
        const sidebarContent = document.getElementById('sidebar-content');
        const toggleIcon = document.getElementById('sidebar-toggle-icon');
        
        if (sidebarContent && toggleIcon) {
            if (state.isSidebarOpen) {
                sidebarContent.classList.remove('hidden');
                sidebarContent.classList.add('flex');
                toggleIcon.innerHTML = Icons.ChevronUp;
            } else {
                sidebarContent.classList.add('hidden');
                sidebarContent.classList.remove('flex');
                toggleIcon.innerHTML = Icons.ChevronDown;
            }
        }
      },

      // --- Calendar 로직 ---
      setCalendarMode: function(mode) {
        state.calendarMode = mode;
        renderCalendar();
      },
      changeMonth: function(delta) {
        if (state.calendarMode === 'day') {
          state.currentViewDate = new Date(state.currentViewDate.getFullYear(), state.currentViewDate.getMonth() + delta, 1);
          renderCalendar();
        }
      },
      setYear: function(year) {
        state.currentViewDate = new Date(year, state.currentViewDate.getMonth(), 1);
        state.calendarMode = 'month';
        renderCalendar();
      },
      setMonth: function(monthIndex) {
        state.currentViewDate = new Date(state.currentViewDate.getFullYear(), monthIndex, 1);
        state.calendarMode = 'day';
        renderCalendar();
      },
      scrollToDate: function(dateStr) {
        const el = document.getElementById(`date-${dateStr}`);
        const scrollArea = document.getElementById('chat-scroll-area');
        if (el && scrollArea) {
          const areaRect = scrollArea.getBoundingClientRect();
          const elRect = el.getBoundingClientRect();
          scrollArea.scrollBy({ top: elRect.top - areaRect.top, behavior: 'smooth' });
        }
        
        // 모바일 환경이면 날짜 선택 후 사이드바 자동 닫기 (채팅 화면 확보)
        if (window.innerWidth < 768 && state.isSidebarOpen) {
            app.toggleSidebar();
        }
      },

      // --- 본인 설정 로직 ---
      setCurrentUser: function(name) {
        if (!name.trim()) return;
        state.currentUser = name.trim();
        renderMain();
      },
      clearCurrentUser: function() {
        state.currentUser = '';
        renderMain();
      },

      // --- Search 로직 ---
      executeSearch: function(query) {
        state.searchQuery = query;
        state.searchResults = [];
        
        if (!query.trim()) {
            state.currentSearchIndex = -1;
            renderChat();
            app.updateSearchUI();
            return;
        }

        const regex = new RegExp(escapeRegExp(query), 'gi');
        let matchIndex = 0;
        
        // 검색 결과를 시간순(0=오래된순 ... N=최신순)으로 배열에 수집
        state.messages.forEach((msg, originalIdx) => {
            const matches = [...msg.message.matchAll(regex)];
            for (let i=0; i<matches.length; i++) {
                state.searchResults.push({
                    globalIndex: matchIndex++,
                    date: msg.date
                });
            }
        });

        if (state.searchResults.length > 0) {
            // 가장 최신 대화를 1번으로 보여주기 위해 마지막 인덱스로 시작
            state.currentSearchIndex = state.searchResults.length - 1; 
        } else {
            state.currentSearchIndex = -1;
        }

        renderChat(); // 하이라이트 적용을 위해 재렌더링
        app.updateSearchUI();
        app.scrollToCurrentMatch();
      },
      navigateSearch: function(direction) {
        if (state.searchResults.length === 0) return;
        
        if (direction === 'older') {
            // 과거 대화로 이동 (배열 상 앞쪽 인덱스)
            state.currentSearchIndex = Math.max(0, state.currentSearchIndex - 1);
        } else {
            // 최근 대화로 이동 (배열 상 뒤쪽 인덱스)
            state.currentSearchIndex = Math.min(state.searchResults.length - 1, state.currentSearchIndex + 1);
        }
        
        renderChat();
        app.updateSearchUI();
        app.scrollToCurrentMatch();
      },
      clearSearch: function() {
        const searchInput = document.getElementById('search-input');
        if (searchInput) {
            searchInput.value = '';
            document.getElementById('search-clear-btn').style.display = 'none';
        }
        app.executeSearch(''); // 빈 검색어로 다시 실행하여 하이라이트 및 UI 초기화
      },
      updateSearchUI: function() {
        const controls = document.getElementById('search-controls');
        const counter = document.getElementById('search-counter');
        if (!controls || !counter) return;

        if (state.searchQuery && state.searchResults.length > 0) {
            controls.classList.remove('hidden');
            const total = state.searchResults.length;
            // 최신이 1이 되도록 역순으로 계산 (total - index)
            const displayIndex = total - state.currentSearchIndex;
            counter.innerText = `${displayIndex} / ${total}`;
        } else if (state.searchQuery && state.searchResults.length === 0) {
            controls.classList.remove('hidden');
            counter.innerText = '0 / 0';
        } else {
            controls.classList.add('hidden');
        }
      },
      scrollToCurrentMatch: function() {
        if (state.currentSearchIndex < 0 || state.searchResults.length === 0) return;
        
        const matchInfo = state.searchResults[state.currentSearchIndex];
        const matchDate = new Date(matchInfo.date);
        
        // 캘린더 화면 동기화 (선택사항)
        if (state.currentViewDate.getFullYear() !== matchDate.getFullYear() ||
            state.currentViewDate.getMonth() !== matchDate.getMonth() ||
            state.calendarMode !== 'day') {
            state.currentViewDate = new Date(matchInfo.date);
            state.calendarMode = 'day';
            renderCalendar();
        }

        // 해당 하이라이트 엘리먼트로 스크롤 이동
        const el = document.getElementById('search-match-' + state.currentSearchIndex);
        const scrollArea = document.getElementById('chat-scroll-area');
        if (el && scrollArea) {
            // 살짝 여유를 두어 스크롤이 확실히 되도록 함
            setTimeout(() => {
                const areaRect = scrollArea.getBoundingClientRect();
                const elRect = el.getBoundingClientRect();
                const offset = elRect.top - areaRect.top - (areaRect.height / 2) + (elRect.height / 2);
                scrollArea.scrollBy({ top: offset, behavior: 'smooth' });
            }, 50);
        }
      }
    };

    // --- [ 렌더링 함수들 ] ---
    const rootEl = document.getElementById('root');

    function renderInitial() {
      rootEl.innerHTML = `
        <div class="h-full overflow-y-auto bg-gray-50 flex items-center justify-center p-4">
          <div ondragenter="app.handleDragEnter(event)"
               ondragover="app.handleDragOver(event)" 
               ondragleave="app.handleDragLeave(event)" 
               ondrop="app.handleDrop(event)"
               class="bg-white p-10 rounded-3xl shadow-2xl max-w-md w-full text-center border-4 border-dashed border-transparent transition-all duration-200 ease-in-out">
            <div class="w-20 h-20 bg-yellow-100 text-yellow-600 rounded-full flex items-center justify-center mx-auto mb-6 pointer-events-none">
              ${Icons.MessageCircle}
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2 pointer-events-none">카카오톡 대화 뷰어</h1>
            <p class="text-gray-500 mb-8 text-sm pointer-events-none">대화방 내보내기를 통해 저장한<br/>.txt 파일을 드래그해서 놓거나 선택해주세요.</p>
            
            <label class="cursor-pointer bg-[#ffe812] hover:bg-[#ffdf00] text-black font-bold py-4 px-6 rounded-xl flex items-center justify-center transition-colors shadow-sm w-fit mx-auto">
              <span class="mr-2" style="width: 20px; height: 20px;">${Icons.Upload}</span>
              <span>파일 선택하기</span>
              <input type="file" accept=".txt" class="hidden" onchange="app.handleFileUpload(event)" />
            </label>
          </div>
        </div>
      `;
    }

    function renderMain() {
      rootEl.innerHTML = `
        <div class="flex flex-col md:flex-row h-full bg-gray-100 font-sans overflow-hidden">
          
          <!-- Sidebar (Calendar, Search & File Replace) -->
          <div class="w-full md:w-80 bg-white border-b md:border-b-0 md:border-r border-gray-200 flex flex-col shadow-lg z-10 shrink-0 md:max-h-full">
            
            <!-- 모바일 전용 사이드바 토글 헤더 -->
            <div class="md:hidden flex items-center justify-between p-3.5 bg-white border-b border-gray-200 cursor-pointer active:bg-gray-50 transition-colors shrink-0" onclick="app.toggleSidebar()">
              <div class="flex items-center text-gray-700 font-bold text-[14px]">
                <span class="mr-2 text-gray-500">${Icons.Menu}</span>
                <span>메뉴 및 달력 검색</span>
              </div>
              <div id="sidebar-toggle-icon" class="text-gray-400 bg-gray-100 p-1 rounded-md">
                ${state.isSidebarOpen ? Icons.ChevronUp : Icons.ChevronDown}
              </div>
            </div>

            <!-- 사이드바 스크롤 영역: 펼쳤을 때 화면의 25% 정도(max-h-[25vh])만 차지하도록 제한 -->
            <div id="sidebar-content" class="${state.isSidebarOpen ? 'flex' : 'hidden'} md:flex flex-1 overflow-y-auto custom-scrollbar relative min-h-0 flex-col max-h-[25vh] md:max-h-none">
              
              <!-- 파일 교체 영역 -->
              <div class="p-4 border-b border-gray-100 bg-gray-50 shrink-0">
                <div 
                  ondragenter="app.handleDragEnter(event)"
                  ondragover="app.handleDragOver(event)" 
                  ondragleave="app.handleDragLeave(event)" 
                  ondrop="app.handleDrop(event)"
                  onclick="document.getElementById('sidebar-file-input').click()"
                  class="flex flex-col items-center justify-center w-full py-4 px-2 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:bg-white transition-all duration-200 ease-in-out bg-transparent group"
                >
                  <input type="file" id="sidebar-file-input" accept=".txt" class="hidden" onclick="event.stopPropagation()" onchange="app.handleFileUpload(event)" />
                  <div class="flex items-center text-gray-700 font-bold mb-2 pointer-events-none group-hover:text-yellow-600 transition-colors">
                    <span class="mr-1.5 text-gray-500 group-hover:text-yellow-600">${Icons.Upload}</span>
                    <span class="text-[14px]">다른 파일로 교체하기</span>
                  </div>
                  <div class="text-[12px] text-gray-400 pointer-events-none w-full px-2 text-center truncate leading-relaxed">
                    <span title="${escapeHtml(state.fileName)}">현재: ${escapeHtml(state.fileName)}</span><br/>
                    <span class="font-medium text-gray-500">총 ${state.messages.length.toLocaleString()}개의 메시지</span>
                  </div>
                </div>
              </div>

              <!-- 본인 설정 영역 -->
              <div class="px-5 py-4 border-b border-gray-100 bg-white">
                <div class="text-[13px] font-bold text-gray-700 mb-2 flex items-center">
                  <span class="mr-1.5 text-gray-500">${Icons.User}</span>
                  본인 설정하기
                </div>
                <div class="flex items-center space-x-2">
                  <input type="text" id="user-input" placeholder="이름 입력 후 엔터" value="${escapeHtml(state.currentUser)}" class="flex-1 px-3 py-1.5 text-sm border border-gray-300 rounded-lg outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition-all bg-gray-50" onkeydown="if(event.key==='Enter') app.setCurrentUser(this.value)">
                  <button onclick="app.setCurrentUser(document.getElementById('user-input').value)" class="px-3 py-1.5 bg-[#ffe812] hover:bg-[#ffdf00] text-black text-sm font-bold rounded-lg transition-colors shadow-sm whitespace-nowrap">
                    적용
                  </button>
                  ${state.currentUser ? `
                  <button onclick="app.clearCurrentUser()" class="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors border border-transparent hover:border-red-100" title="설정 취소">
                    ${Icons.X}
                  </button>
                  ` : ''}
                </div>
              </div>

              <!-- Calendar -->
              <div id="calendar-container"></div>
              
              <!-- 범례 -->
              <div class="px-6 pb-4">
                <div class="flex items-center text-xs text-gray-500">
                  <div class="w-3 h-3 bg-[#ffe812] rounded-full mr-2 shadow-sm"></div>
                  대화가 있는 날짜
                </div>
              </div>
              
              <!-- Search UI -->
              <div class="px-5 pb-5 border-t border-gray-100 pt-5">
                <div class="flex items-center bg-white border border-gray-300 rounded-lg overflow-hidden focus-within:border-yellow-400 focus-within:ring-1 focus-within:ring-yellow-400 transition-all shadow-sm">
                  <div class="relative flex-1 flex items-center">
                    <input type="text" id="search-input" placeholder="대화 내용 검색..." value="${escapeHtml(state.searchQuery)}" class="w-full pl-3 pr-8 py-2 text-sm outline-none bg-transparent" onkeydown="if(event.key==='Enter') app.executeSearch(this.value)" oninput="document.getElementById('search-clear-btn').style.display = this.value ? 'block' : 'none'">
                    <button id="search-clear-btn" onclick="app.clearSearch()" class="absolute right-1.5 p-1 text-gray-400 hover:text-gray-600 transition-colors" style="display: ${state.searchQuery ? 'block' : 'none'};" title="검색어 지우기">
                      ${Icons.X}
                    </button>
                  </div>
                  <button onclick="app.executeSearch(document.getElementById('search-input').value)" class="p-2.5 text-gray-500 hover:text-yellow-600 transition-colors bg-gray-50 border-l border-gray-200">
                    ${Icons.Search}
                  </button>
                </div>
                
                <div id="search-controls" class="flex justify-between items-center mt-3 px-1 hidden">
                  <span id="search-counter" class="text-xs text-gray-600 font-bold bg-white px-2.5 py-1 rounded border border-gray-200 shadow-sm">0 / 0</span>
                  <div class="flex gap-1.5">
                    <button onclick="app.navigateSearch('older')" class="p-1.5 rounded-md bg-white border border-gray-200 hover:bg-gray-100 text-gray-600 transition-colors shadow-sm focus:outline-none focus:ring-1 focus:ring-yellow-400" title="이전 (과거 대화)">
                      ${Icons.ArrowUp}
                    </button>
                    <button onclick="app.navigateSearch('newer')" class="p-1.5 rounded-md bg-white border border-gray-200 hover:bg-gray-100 text-gray-600 transition-colors shadow-sm focus:outline-none focus:ring-1 focus:ring-yellow-400" title="다음 (최근 대화)">
                      ${Icons.ArrowDown}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Main Chat Area: min-h-0 추가로 레이아웃 안정성 극대화 -->
          <div id="chat-scroll-area" class="flex-1 bg-[#b2c7d9] overflow-y-auto scroll-smooth relative custom-scrollbar min-h-0">
            <div class="max-w-3xl mx-auto py-8 px-4 sm:px-6" id="chat-container">
            </div>
          </div>
        </div>
      `;
      
      renderCalendar();
      renderChat();
      app.updateSearchUI(); // 초기화 후 UI 반영
    }

    function renderCalendar() {
      const calContainer = document.getElementById('calendar-container');
      if (!calContainer) return;

      const year = state.currentViewDate.getFullYear();
      const month = state.currentViewDate.getMonth();
      let contentHtml = '';

      // Calendar Header HTML
      const isDayMode = state.calendarMode === 'day';
      let headerHtml = `
        <div class="flex justify-between items-center px-4 py-6">
          <button onclick="app.changeMonth(-1)" class="p-2 rounded-full hover:bg-gray-100 transition-colors ${!isDayMode ? 'invisible' : ''}">
            <span class="text-gray-600">${Icons.ChevronLeft}</span>
          </button>
          
          <div class="flex items-center text-lg font-bold text-gray-800 space-x-2">
            <span onclick="app.setCalendarMode('year')" class="cursor-pointer hover:text-yellow-600 hover:underline px-1 transition-colors">
              ${year}년
            </span>
            ${state.calendarMode !== 'year' ? `
              <span onclick="app.setCalendarMode('month')" class="cursor-pointer hover:text-yellow-600 hover:underline px-1 transition-colors">
                ${month + 1}월
              </span>
            ` : ''}
          </div>

          <button onclick="app.changeMonth(1)" class="p-2 rounded-full hover:bg-gray-100 transition-colors ${!isDayMode ? 'invisible' : ''}">
            <span class="text-gray-600">${Icons.ChevronRight}</span>
          </button>
        </div>
      `;

      // Calendar Body HTML
      if (state.calendarMode === 'year') {
        let yearBtns = '';
        for (let y = state.minYear; y <= state.maxYear; y++) {
          const hasTalk = Array.from(state.activeDates).some(date => date.startsWith(y + '-'));
          let btnClass = hasTalk 
            ? 'bg-[#ffe812] text-black font-bold hover:bg-[#ffdf00] hover:scale-105 shadow-md ring-2 ring-yellow-200 ring-offset-1 z-10' 
            : 'text-gray-500 hover:bg-gray-100 font-medium';
            
          yearBtns += `
            <button onclick="app.setYear(${y})" class="p-3 rounded-lg transition-all ${btnClass}">
              ${y}년
            </button>
          `;
        }
        contentHtml = `<div class="grid grid-cols-3 gap-2 p-4">${yearBtns}</div>`;
      } 
      else if (state.calendarMode === 'month') {
        let monthBtns = '';
        for (let m = 1; m <= 12; m++) {
          const prefix = `${year}-${String(m).padStart(2, '0')}-`;
          const hasTalk = Array.from(state.activeDates).some(date => date.startsWith(prefix));
          let btnClass = hasTalk 
            ? 'bg-[#ffe812] text-black font-bold hover:bg-[#ffdf00] hover:scale-105 shadow-md ring-2 ring-yellow-200 ring-offset-1 z-10' 
            : 'text-gray-500 hover:bg-gray-100 font-medium';

          monthBtns += `
            <button onclick="app.setMonth(${m - 1})" class="p-3 rounded-lg transition-all ${btnClass}">
              ${m}월
            </button>
          `;
        }
        contentHtml = `<div class="grid grid-cols-3 gap-2 p-4">${monthBtns}</div>`;
      } 
      else {
        // Day mode
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

        let headers = dayNames.map((d, i) => 
          `<div class="text-center font-semibold text-xs py-2 ${i === 0 ? 'text-red-400' : i === 6 ? 'text-blue-400' : 'text-gray-500'}">${d}</div>`
        ).join('');

        let dayCells = '';
        for (let i = 0; i < firstDay; i++) {
          dayCells += `<div class="p-2"></div>`;
        }

        for (let i = 1; i <= daysInMonth; i++) {
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
          const hasTalk = state.activeDates.has(dateStr);
          
          let btnClass = hasTalk 
            ? 'bg-[#ffe812] text-black font-bold cursor-pointer hover:bg-[#ffdf00] hover:scale-110 shadow-md ring-2 ring-yellow-200 ring-offset-1' 
            : 'text-gray-400 cursor-default hover:bg-gray-50';
            
          dayCells += `
            <div class="flex justify-center items-center py-1">
              <button 
                ${hasTalk ? `onclick="app.scrollToDate('${dateStr}')"` : 'disabled'}
                title="${hasTalk ? "대화로 이동" : ""}"
                class="w-9 h-9 rounded-full flex items-center justify-center text-sm transition-all ${btnClass}"
              >
                ${i}
              </button>
            </div>
          `;
        }
        contentHtml = `<div class="grid grid-cols-7 gap-1 p-4 pt-2">${headers}${dayCells}</div>`;
      }

      calContainer.innerHTML = headerHtml + contentHtml;
    }

    function renderChat() {
      const chatContainer = document.getElementById('chat-container');
      if (!chatContainer) return;

      let chatHtml = '';
      let globalMatchCounter = 0; // 하이라이트를 위한 글로벌 매치 인덱스
      let regex = state.searchQuery ? new RegExp(escapeRegExp(state.searchQuery), 'gi') : null;

      Object.entries(state.groupedMessages).forEach(([date, msgs]) => {
        let dateGroupHtml = `
          <div id="date-${date}" class="mb-10">
            <!-- 날짜 구분선 -->
            <div class="flex justify-center mb-6 sticky top-4 z-10">
              <div class="bg-black bg-opacity-20 backdrop-blur-sm text-white text-[13px] px-4 py-1.5 rounded-full flex items-center shadow-sm">
                <span class="mr-2 opacity-80">${Icons.Calendar}</span>
                ${formatDateKor(date)}
              </div>
            </div>
        `;

        msgs.forEach(msg => {
          let isMe = state.currentUser && msg.sender.trim() === state.currentUser;
          let marginClass = msg.showProfile ? 'mt-5' : '';

          // 하이라이트 텍스트 렌더링 로직 (시스템/일반 메시지 공통)
          let messageContentHtml = '';
          if (regex) {
              const text = msg.message;
              const matches = [...text.matchAll(regex)];
              let lastIdx = 0;
              
              matches.forEach(match => {
                  // 일치하지 않는 이전 텍스트는 일반 탈출 처리
                  messageContentHtml += escapeHtml(text.substring(lastIdx, match.index));
                  
                  // 검색된 부분 강조 처리
                  let isCurrent = (globalMatchCounter === state.currentSearchIndex);
                  // 본인 말풍선이 노란색이므로 검색 하이라이트 색상 미세 조정
                  let activeClass = isCurrent 
                      ? 'bg-[#ff8800] text-white font-bold px-1 rounded shadow-md transition-all inline-block ring-2 ring-[#ff8800] ring-offset-1' 
                      : (msg.isSystem ? 'bg-[#ffe812] text-black px-0.5 rounded' : (isMe ? 'bg-white text-black px-0.5 rounded' : 'bg-[#ffe812] text-black px-0.5 rounded'));
                      
                  messageContentHtml += `<mark id="search-match-${globalMatchCounter}" class="${activeClass}">${escapeHtml(match[0])}</mark>`;
                  
                  globalMatchCounter++;
                  lastIdx = match.index + match[0].length;
              });
              // 남은 텍스트 추가
              messageContentHtml += escapeHtml(text.substring(lastIdx));
          } else {
              messageContentHtml = escapeHtml(msg.message);
          }

          // 시스템 메시지 렌더링
          if (msg.isSystem) {
              dateGroupHtml += `
                <div class="flex justify-center mb-3 mt-3 w-full">
                  <div class="bg-black bg-opacity-[0.08] text-gray-600 text-[12px] px-4 py-1.5 rounded-full flex items-center shadow-sm max-w-[80%] text-center break-words leading-relaxed">
                    ${messageContentHtml}
                  </div>
                </div>
              `;
              return; // 다음 메시지로 넘어감
          }

          let profileHtml = '';
          if (!isMe) {
            if (msg.showProfile) {
              const color = stringToColor(msg.sender);
              const initial = escapeHtml(msg.sender.charAt(0));
              profileHtml = `
                <div class="w-[42px] h-[42px] rounded-[18px] flex-shrink-0 flex items-center justify-center text-white font-bold mr-3 shadow-sm text-lg mt-1" style="background-color: ${color}">
                  ${initial}
                </div>
              `;
            } else {
              profileHtml = `<div class="w-[42px] mr-3 flex-shrink-0"></div>`;
            }
          }

          let nameHtml = (!isMe && msg.showProfile) ? `<span class="text-[13px] text-gray-700 mb-1 ml-1 font-medium tracking-tight">${escapeHtml(msg.sender)}</span>` : '';
          
          let timeHtml = msg.showTime ? `<span class="text-[11px] text-gray-500 ${isMe ? 'mr-2' : 'ml-2'} mb-1 flex-shrink-0 whitespace-nowrap opacity-80 group-hover:opacity-100 transition-opacity">${msg.time}</span>` : '';

          let bubbleBg = isMe ? 'bg-[#ffe812]' : 'bg-white';
          let bubbleRadius = isMe ? 'rounded-tr-sm' : 'rounded-tl-sm';

          dateGroupHtml += `
            <div class="flex mb-2 ${marginClass} ${isMe ? 'justify-end' : ''}">
              ${profileHtml}
              <div class="flex flex-col max-w-[75%] sm:max-w-[70%] ${isMe ? 'items-end' : ''}">
                ${nameHtml}
                <div class="flex items-end group ${isMe ? 'flex-row-reverse' : ''}">
                  <div class="${bubbleBg} px-3.5 py-2 rounded-2xl ${bubbleRadius} text-[15px] text-gray-800 shadow-sm break-words whitespace-pre-wrap leading-[1.4] border border-gray-100/50">${messageContentHtml}</div>
                  ${timeHtml}
                </div>
              </div>
            </div>
          `;
        });

        dateGroupHtml += `</div>`;
        chatHtml += dateGroupHtml;
      });

      chatContainer.innerHTML = chatHtml;
    }

    // --- [ 초기 실행 ] ---
    renderInitial();

  </script>
